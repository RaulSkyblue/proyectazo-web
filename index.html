<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectazo</title>
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        .success {
            color: green;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Proyectazo</h1>
    <h2>Barra de menu</h2>
    
    <div class="login-container">
        <h2>Formulario de Login</h2>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" />
                <div id="username-error" class="error"></div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" />
                <div id="password-error" class="error"></div>
            </div>
            <button type="submit">Ingresar</button>
            <div id="login-message"></div>
        </form>
    </div>

    <script>
        function validateUsername(username) {
            // Check if username is empty or only whitespace
            if (!username || username.trim() === '') {
                return {
                    isValid: false,
                    message: 'El usuario no puede estar vacío'
                };
            }
            return {
                isValid: true,
                message: ''
            };
        }

        function validatePassword(password) {
            // Check if password is empty or only whitespace
            if (!password || password.trim() === '') {
                return {
                    isValid: false,
                    message: 'La contraseña no puede estar vacía'
                };
            }
            return {
                isValid: true,
                message: ''
            };
        }

        function clearErrors() {
            document.getElementById('username-error').textContent = '';
            document.getElementById('password-error').textContent = '';
            document.getElementById('login-message').textContent = '';
        }

        function handleLogin(event) {
            event.preventDefault(); // Prevent form submission
            
            clearErrors();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const usernameValidation = validateUsername(username);
            const passwordValidation = validatePassword(password);
            
            let isFormValid = true;
            
            // Show username validation error
            if (!usernameValidation.isValid) {
                document.getElementById('username-error').textContent = usernameValidation.message;
                isFormValid = false;
            }
            
            // Show password validation error
            if (!passwordValidation.isValid) {
                document.getElementById('password-error').textContent = passwordValidation.message;
                isFormValid = false;
            }
            
            // If validation fails, prevent form submission
            if (!isFormValid) {
                return false;
            }
            
            // If validation passes, show success message
            document.getElementById('login-message').innerHTML = 
                '<div class="success">Login exitoso para usuario: ' + username + '</div>';
            
            return false; // Prevent actual form submission for demo purposes
        }

        // Export functions for testing purposes
        if (typeof module !== 'undefined' && module.exports) {
            module.exports = {
                validateUsername,
                validatePassword
            };
        }
    </script>
</body>
</html>
